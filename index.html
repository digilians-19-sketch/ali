<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام حضور المحاضرين | DIGILIANS</title>
<link href="https://fonts.googleapis.com/css2=family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  --navy:#1F4E79; --blue:#2E75B6; --sky:#DEEAF1;
  --accent:#F0A500; --green:#28A745; --red:#DC3545;
  --bg:#F4F7FC; --text:#1a2a3a;
  --card-bg: #ffffff;
  --shadow:0 8px 32px rgba(31,78,121,0.13);
}

/* ===== DARK MODE VARIABLES ===== */
body.dark-mode {
  --bg:#0F172A; --text:#F1F5F9; --sky:#1E293B;
  --card-bg:#1E293B;
  --shadow:0 8px 32px rgba(0,0,0,0.4);
}

*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* Smooth transition for theme toggle */
body, .lec-card, .table-card, .instructions-card, .stat-card, select, input, .tabs, .tab {
  transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
}

/* ===== DARK MODE TOGGLE BUTTON ===== */
.theme-toggle-btn {
  position: fixed; left: 20px; top: 20px; z-index: 9999;
  background: var(--card-bg); color: var(--text);
  border: 2px solid var(--blue); border-radius: 50%;
  width: 46px; height: 46px; font-size: 1.3rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 15px rgba(0,0,0,0.15);
}
.theme-toggle-btn:hover { transform: scale(1.05); }

/* ===== LECTURER VIEW ===== */
#lecturer-view {
  min-height:100vh;
  background:linear-gradient(135deg,#1F4E79 0%,#2E75B6 60%,#4a90d9 100%);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:24px;
}
body.dark-mode #lecturer-view {
  background: linear-gradient(135deg, #0F172A 0%, #152238 60%, #1E293B 100%);
}
.lec-card {
  background:var(--card-bg); border-radius:24px; padding:40px 36px;
  box-shadow:0 20px 60px rgba(0,0,0,0.2); width:100%; max-width:460px;
}
.lec-logo { text-align:center; margin-bottom:20px; display:flex; flex-direction:column; align-items:center; }
.lec-logo h1 { color:var(--navy); font-size:1.4rem; font-weight:900; margin-top:12px; }
body.dark-mode .lec-logo h1 { color: #FFFFFF; }
.lec-logo p { color:#666; font-size:0.85rem; margin-top:4px; }
body.dark-mode .lec-logo p { color:#aaa; }

.live-badge {
  display:inline-flex; align-items:center; gap:6px;
  background:var(--sky); color:var(--navy);
  border-radius:20px; padding:6px 14px; font-size:0.82rem; font-weight:700;
  margin-bottom:24px;
}
body.dark-mode .live-badge { color: #F1F5F9; }
.live-dot { width:8px; height:8px; border-radius:50%; background:var(--green); animation:pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.3;} }

.form-group { margin-bottom:18px; }
.form-group label { display:block; font-weight:700; margin-bottom:7px; color:var(--navy); font-size:0.92rem; }
body.dark-mode .form-group label { color:#cbd5e1; }
.form-group select, .form-group input {
  width:100%; padding:13px 16px; border:2px solid #dde3ee; border-radius:12px;
  font-family:'Cairo',sans-serif; font-size:0.95rem; color:var(--text);
  transition:border-color 0.2s; background:#fafbff;
}
body.dark-mode .form-group select, body.dark-mode .form-group input {
  background: #151F32; border-color: #334155; color: #F1F5F9;
}
.form-group select:focus, .form-group input:focus { outline:none; border-color:var(--blue); }

.action-btns { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:8px; }
.btn-attend {
  background:linear-gradient(135deg,#28A745,#20c997); color:white;
  padding:16px; border-radius:14px; font-size:1.05rem; font-weight:700;
  cursor:pointer; border:none; font-family:'Cairo',sans-serif; transition:all 0.2s;
}
.btn-leave {
  background:linear-gradient(135deg,#DC3545,#e74c5f); color:white;
  padding:16px; border-radius:14px; font-size:1.05rem; font-weight:700;
  cursor:pointer; border:none; font-family:'Cairo',sans-serif; transition:all 0.2s;
}
.btn-attend:hover,.btn-leave:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(0,0,0,0.18); }
.btn-attend:disabled,.btn-leave:disabled { opacity:0.5; cursor:not-allowed; transform:none; }

.success-msg {
  display:none; background:linear-gradient(135deg,#e8f8ee,#d4f4e0);
  border:2px solid var(--green); border-radius:14px; padding:20px;
  text-align:center; margin-top:18px;
}
body.dark-mode .success-msg { background: linear-gradient(135deg, #064e3b, #022c22); }
.success-msg .s-icon { font-size:2.5rem; }
.success-msg h3 { color:var(--green); font-size:1.05rem; margin-top:6px; }
.success-msg p { color:#444; font-size:0.85rem; margin-top:5px; }
body.dark-mode .success-msg
