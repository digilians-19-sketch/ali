<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام حضور المحاضرين — Digilians</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  --navy:#1F4E79; --blue:#2E75B6; --sky:#DEEAF1;
  --accent:#F0A500; --green:#28A745; --red:#DC3545;
  --bg:#F4F7FC; --text:#1a2a3a;
  --shadow:0 8px 32px rgba(31,78,121,0.13);
}

/* ===== DARK MODE VARIABLES ===== */
body.dark-mode {
  --bg: #0f172a;
  --text: #f8fafc;
  --navy: #38bdf8;
  --blue: #0ea5e9;
  --sky: #1e293b;
  --shadow: 0 10px 30px rgba(0,0,0,0.5);
}

*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh; transition: background 0.3s, color 0.3s;}

/* ===== FLOATING DARK MODE BUTTON ===== */
.dark-mode-btn {
  position: fixed;
  top: 20px;
  left: 20px;
  z-index: 9999;
  background: var(--navy);
  color: white;
  border: none;
  width: 45px;
  height: 45px;
  border-radius: 50%;
  font-size: 1.25rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: var(--shadow);
  transition: all 0.3s ease;
}
.dark-mode-btn:hover { transform: scale(1.1); }
body.dark-mode .dark-mode-btn { background: #e2e8f0; color: #0f172a; }

/* ===== PROFESSIONAL DIGILIANS LOGO ===== */
.digilians-logo {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-family: 'Cairo', sans-serif;
  font-size: 2.4rem;
  font-weight: 900;
  letter-spacing: -1px;
  justify-content: center;
  margin-bottom: 5px;
  user-select: none;
}
.digilians-logo .part-digi {
  background: linear-gradient(135deg, #1F4E79, #2E75B6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
body.dark-mode .digilians-logo .part-digi {
  background: linear-gradient(135deg, #38bdf8, #38bdf8);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.digilians-logo .part-lians {
  color: var(--accent);
}
.digilians-logo .logo-dot {
  width: 7px;
  height: 7px;
  background: var(--accent);
  border-radius: 50%;
  display: inline-block;
  margin-right: 2px;
  animation: pulse 2s infinite;
}

/* ===== LECTURER VIEW ===== */
#lecturer-view {
  min-height:100vh;
  background:linear-gradient(135deg,#1F4E79 0%,#2E75B6 60%,#4a90d9 100%);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:24px;
  transition: background 0.3s;
}
body.dark-mode #lecturer-view {
  background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
}
.lec-card {
  background:white; border-radius:24px; padding:40px 36px;
  box-shadow:0 20px 60px rgba(0,0,0,0.2); width:100%; max-width:460px;
  transition: background 0.3s;
}
body.dark-mode .lec-card { background: #1e293b; }

.lec-logo { text-align:center; margin-bottom:24px; }
.lec-logo h1 { color:var(--navy); font-size:1.35rem; font-weight:900; margin-top:8px; }
.lec-logo p { color:#666; font-size:0.85rem; margin-top:4px; }
body.dark-mode .lec-logo p { color: #94a3b8; }

.live-badge {
  display:inline-flex; align-items:center; gap:6px;
  background:var(--sky); color:var(--navy);
  border-radius:20px; padding:6px 14px; font-size:0.82rem; font-weight:700;
  margin-bottom:24px;
}
.live-dot { width:8px; height:8px; border-radius:50%; background:var(--green); animation:pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.3;} }

.form-group { margin-bottom:18px; }
.form-group label { display:block; font-weight:700; margin-bottom:7px; color:var(--navy); font-size:0.92rem; }
.form-group select, .form-group input {
  width:100%; padding:13px 16px; border:2px solid #dde3ee; border-radius:12px;
  font-family:'Cairo',sans-serif; font-size:0.95rem; color:var(--text);
  transition:all 0.2s; background:#fafbff;
}
.form-group select:focus, .form-group input:focus { outline:none; border-color:var(--blue); }

body.dark-mode .form-group select, body.dark-mode .form-group input {
  background: #0f172a; border-color: #334155; color: #f8fafc;
}

.action-btns { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:8px; }
.btn-attend {
  background:linear-gradient(135deg,#28A745,#20c997); color:white;
  padding:16px; border-radius:14px; font-size:1.05rem; font-weight:700;
  cursor:pointer; border:none; font-family:'Cairo',sans-serif; transition:all 0.2s;
}
.btn-leave {
  background:linear-gradient(135deg,#DC3545,#e74c5f); color:white;
  padding:16px; border-radius:14px; font-size:1.05rem; font-weight:700;
  cursor:pointer; border:none; font-family:'Cairo',sans-serif; transition:all 0.2s;
}
.btn-attend:hover,.btn-leave:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(0,0,0,0.18); }
.btn-attend:disabled,.btn-leave:disabled { opacity:0.5; cursor:not-allowed; transform:none; }

.success-msg {
  display:none; background:linear-gradient(135deg,#e8f8ee,#d4f4e0);
  border:2px solid var(--green); border-radius:14px; padding:20px;
  text-align:center; margin-top:18px;
}
body.dark-mode .success-msg { background: linear-gradient(135deg, #064e3b, #022c22); }
.success-msg .s-icon { font-size:2.5rem; }
.success-msg h3 { color:var(--green); font-size:1.05rem; margin-top:6px; }
.success-msg p { color:#444; font-size:0.85rem; margin-top:5px; }
body.dark-mode .success-msg p { color: #a7f3d0; }

.admin-link {
  text-align:center; margin-top:20px;
  font-size:0.78rem; color:rgba(255,255,255,0.5);
  cursor:pointer; user-select:none;
}
.admin-link:hover { color:rgba(255,255,255,0.8); }

/* ===== ADMIN VIEW ===== */
#admin-view { display:none; min-height:100vh; }
header {
  background:linear-gradient(135deg,#1F4E79,#2E75B6);
  color:white; padding:18px 28px;
  display:flex; align-items:center; justify-content:space-between;
  box-shadow:0 4px 20px rgba(31,78,121,0.3);
}
body.dark-mode header { background: linear-gradient(135deg, #1e293b, #0f172a); }

header h1 { font-size:1.2rem; font-weight:900; }
.header-right { display:flex; align-items:center; gap:12px; }
.live-time {
  background:rgba(255,255,255,0.15); border-radius:10px;
  padding:7px 14px; font-weight:700; font-size:0.95rem; text-align:center;
}
.btn-logout {
  background:rgba(255,255,255,0.2); color:white; border:2px solid rgba(255,255,255,0.4);
  border-radius:10px; padding:7px 16px; cursor:pointer; font-family:'Cairo',sans-serif;
  font-size:0.85rem; font-weight:700; transition:all 0.2s;
}
.btn-logout:hover { background:rgba(255,255,255,0.35); }

.tabs {
  display:flex; background:white; border-bottom:3px solid var(--sky);
  padding:0 28px; gap:4px; overflow-x:auto;
}
body.dark-mode .tabs { background: #1e293b; }
.tab {
  padding:13px 22px; cursor:pointer; font-weight:700; font-size:0.9rem;
  color:#666; border-bottom:3px solid transparent; margin-bottom:-3px;
  transition:all 0.2s; white-space:nowrap;
}
body.dark-mode .tab { color: #94a3b8; }
.tab.active { color:var(--navy); border-bottom-color:var(--accent); }

.content { display:none; padding:28px; max-width:1100px; margin:0 auto; }
.content.active { display:block; }

/* QR CARD */
.qr-wrapper { display:grid; grid-template-columns:auto 1fr; gap:32px; align-items:start; }
.qr-card {
  background:white; border-radius:20px; padding:28px;
  box-shadow:var(--shadow); text-align:center; min-width:260px;
}
body.dark-mode .qr-card { background: #1e293b; }
.qr-card h2 { color:var(--navy); font-size:1.1rem; margin-bottom:18px; }

#qr-container {
  display:inline-flex; padding:14px; background:white !important; /* يحافظ على اللون الأبيض دائماً من أجل القراءة الموثوقة للمسح */
  border:4px solid var(--sky); border-radius:12px; margin-bottom:16px;
}
.qr-note { background:var(--sky); border-radius:8px; padding:10px 12px; font-size:0.78rem; color:var(--navy); margin-bottom:14px; word-break:break-all; }

.btn { display:inline-block; padding:9px 20px; border-radius:10px; font-family:'Cairo',sans-serif; font-weight:700; font-size:0.88rem; cursor:pointer; border:none; transition:all 0.2s; }
.btn-primary { background:var(--navy); color:white; }
.btn-primary:hover { background:var(--blue); }
body.dark-mode .btn-primary { background: #0ea5e9; color: white; }
body.dark-mode .btn-primary:hover { background: #38bdf8; }
.btn-accent { background:var(--accent); color:white; }
.btn-green { background:var(--green); color:white; }
.btn-red { background:var(--red); color:white; }
.btn-outline { background:transparent; color:var(--navy); border:2px solid var(--navy); }
body.dark-mode .btn-outline { color: var(--navy); border-color: var(--navy); }

.instructions-card { background:white; border-radius:20px; padding:28px; box-shadow:var(--shadow); }
body.dark-mode .instructions-card { background: #1e293b; }
.instructions-card h3 { color:var(--navy); margin-bottom:18px; }
.step { display:flex; align-items:flex-start; gap:12px; margin-bottom:14px; padding:12px; background:var(--sky); border-radius:10px; }
.step-num { background:var(--navy); color:white; width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:0.85rem; flex-shrink:0; }
body.dark-mode .step-num { background: #0ea5e9; color: #0f172a; }
.step p { font-size:0.9rem; line-height:1.6; }

/* Stats */
.stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:18px; margin-bottom:28px; }
.stat-card { background:white; border-radius:16px; padding:22px; box-shadow:var(--shadow); text-align:center; border-top:4px solid var(--blue); }
body.dark-mode .stat-card { background: #1e293b; }
.stat-card .num { font-size:2rem; font-weight:900; color:var(--navy); }
.stat-card .lbl { font-size:0.82rem; color:#666; margin-top:4px; }
body.dark-mode .stat-card .lbl { color: #94a3b8; }

/* Table */
.table-card { background:white; border-radius:20px; padding:26px; box-shadow:var(--shadow); }
body.dark-mode .table-card { background: #1e293b; }
.table-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:18px; flex-wrap:wrap; gap:10px; }
.table-header h2 { color:var(--navy); font-size:1.1rem; }
.tbl-actions { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
.records-count { background:var(--sky); color:var(--navy); padding:5px 12px; border-radius:20px; font-weight:700; font-size:0.82rem; }

.filter-row { display:flex; gap:10px; margin-bottom:16px; flex-wrap:wrap; }
.filter-row select, .filter-row input {
  padding:8px 12px; border:2px solid #dde3ee; border-radius:8px;
  font-family:'Cairo',sans-serif; font-size:0.85rem; color:var(--text);
}
body.dark-mode .filter-row select, body.dark-mode .filter-row input {
  background: #0f172a; border-color: #334155; color: #f8fafc;
}

table { width:100%; border-collapse:collapse; }
thead th { background:var(--navy); color:white; padding:11px 14px; text-align:center; font-size:0.88rem; font-weight:700; }
body.dark-mode thead th { background: #0f172a; color: #38bdf8; }
tbody tr:nth-child(even) { background:var(--sky); }
tbody tr:hover { background:#d0e4f5; }
